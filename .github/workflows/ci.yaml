name: Code Quality and Testing

on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "docs/**"
  push:
    branches:
      - master
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "docs/**"

permissions:
  contents: read

jobs:
  format:
    name: Quality Check
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node Environment
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Formatter
        run: npm run format -- --check

  test:
    name: Application Tests
    runs-on: ubuntu-24.04
    needs: format

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node Environment
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test
