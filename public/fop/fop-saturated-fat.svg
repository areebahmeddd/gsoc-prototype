<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 106" role="img" aria-label="High in Saturated Fat warning">
  <!-- Black rounded badge – Health Canada FOP warning style -->
  <rect width="80" height="106" rx="11" fill="#1a1a1a"/>

  <!-- Magnifying glass lens -->
  <circle cx="40" cy="34" r="16" fill="none" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- Magnifying glass handle (lower-right at 45°) -->
  <line x1="51" y1="45" x2="61" y2="55" stroke="white" stroke-width="5" stroke-linecap="round"/>

  <!-- Hairline divider -->
  <line x1="10" y1="65" x2="70" y2="65" stroke="white" stroke-width="0.75" opacity="0.35"/>

  <!-- HIGH IN label -->
  <text
    x="40" y="75"
    fill="white"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="8.5"
    font-weight="700"
    text-anchor="middle"
    letter-spacing="1"
  >HIGH IN</text>

  <!-- Nutrient name – two lines for "SATURATED FAT" -->
  <text
    x="40" y="87"
    fill="white"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="10.5"
    font-weight="700"
    text-anchor="middle"
  >SATURATED</text>
  <text
    x="40" y="100"
    fill="white"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="10.5"
    font-weight="700"
    text-anchor="middle"
  >FAT</text>
</svg>
