<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" role="img" aria-label="FOP data not available">
  <!-- Grey rounded badge – matches Health Canada FOP badge dimensions -->
  <rect width="80" height="100" rx="11" fill="#b3b3b3"/>

  <!-- Question mark -->
  <text
    x="40" y="50"
    fill="white"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="34"
    font-weight="700"
    text-anchor="middle"
    dominant-baseline="middle"
  >?</text>

  <!-- Hairline divider -->
  <line x1="10" y1="65" x2="70" y2="65" stroke="white" stroke-width="0.75" opacity="0.35"/>

  <!-- NO DATA label -->
  <text
    x="40" y="75"
    fill="white"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="8.5"
    font-weight="700"
    text-anchor="middle"
    letter-spacing="1"
  >NO DATA</text>

  <!-- FOP label -->
  <text
    x="40" y="89"
    fill="white"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="13"
    font-weight="700"
    text-anchor="middle"
  >FOP</text>
</svg>
